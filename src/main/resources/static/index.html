<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipLink | Modern URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22d3ee;
            --secondary: #818cf8;
            --danger: #f43f5e;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(34, 211, 238, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1, h2 {
            font-family: 'Outfit', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .burn-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem 0;
            user-select: none;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #334155;
            border-radius: 12px;
            position: relative;
            transition: 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }

        input[type="checkbox"] {
            display: none;
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background: var(--danger);
        }

        input[type="checkbox"]:checked + .toggle-switch::after {
            left: 23px;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-section {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .short-url-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        #shortUrlText {
            color: var(--accent);
            font-weight: 700;
            word-break: break-all;
            text-decoration: none;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .qr-container {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 1rem;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }

        .qr-container img {
            display: block;
            max-width: 200px;
        }

        .analytics-link {
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .analytics-link:hover {
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 1rem 0;
        }

        .dot-flashing {
            position: relative;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: var(--primary);
            color: var(--primary);
            animation: dot-flashing 1s infinite linear alternate;
            display: inline-block;
        }

        @keyframes dot-flashing {
            0% { background-color: var(--primary); }
            50%, 100% { background-color: rgba(99, 102, 241, 0.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">ZipLink</div>
                <p class="subtitle">Shorten URLs and generate QR codes instantly</p>
            </div>

            <form id="shortenForm">
                <div class="form-group">
                    <label>Long URL</label>
                    <input type="url" id="originalUrl" placeholder="https://example.com/very-long-link" required>
                </div>

                <div class="form-group">
                    <label>Custom Alias (Optional)</label>
                    <input type="text" id="alias" placeholder="custom-link">
                </div>

                <div class="form-group">
                    <label>Expiration Date & Time (Optional)</label>
                    <input type="datetime-local" id="expiresAtInput" style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 0.8rem 1rem; color: white; font-size: 1rem;">
                </div>

                <label class="burn-toggle">
                    <input type="checkbox" id="oneTimeUse">
                    <div class="toggle-switch"></div>
                    <div>
                        <span style="font-weight: 700; color: var(--danger);">One-Time Use (Burn)</span>
                    </div>
                </label>

                <button type="submit" class="btn" id="submitBtn">Shorten Link</button>
            </form>

            <div class="loading" id="loader">
                <div class="dot-flashing"></div>
            </div>

            <div class="result-section" id="resultSection">
                <h2 style="margin-bottom: 1rem;">Your ZipLink is ready!</h2>
                
                <div class="qr-container">
                    <img id="qrImage" src="" alt="QR Code">
                </div>

                <div class="short-url-box">
                    <a href="#" id="shortUrlText" target="_blank"></a>
                    <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
                </div>

                <p style="color: var(--text-muted); font-size: 0.9rem;">
                    This link will <span id="burnStatus"></span>.
                </p>

                <a href="#" id="analyticsLink" class="analytics-link" target="_blank">View Live Analytics →</a>
                
                <button type="button" class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-top: 1.5rem;" onclick="resetForm()">Create Another</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('shortenForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultSection = document.getElementById('resultSection');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const originalUrl = document.getElementById('originalUrl').value;
            const alias = document.getElementById('alias').value;
            const oneTimeUse = document.getElementById('oneTimeUse').checked;
            const expiresAtInput = document.getElementById('expiresAtInput').value;

            let expiresAt = null;
            if (expiresAtInput) {
                expiresAt = new Date(expiresAtInput).toISOString();
            }

            // Show loading
            form.style.display = 'none';
            loader.style.display = 'block';

            const requestBody = { 
                originalUrl, 
                oneTimeUse, 
                expiresAt 
            };
            
            if (alias && alias.trim() !== '') {
                requestBody.alias = alias.trim();
            }

            try {
                const response = await fetch('/api/v1/urls', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || 'Failed to shorten URL');
                }

                const data = await response.json();
                
                // Update UI
                document.getElementById('shortUrlText').innerText = data.shortUrl;
                document.getElementById('shortUrlText').href = data.shortUrl;
                document.getElementById('qrImage').src = 'data:image/png;base64,' + data.qrCodeBase64;
                document.getElementById('burnStatus').innerText = oneTimeUse ? "burn after its first read" : "be available indefinitely";
                
                // Analytics link
                const code = data.shortUrl.split('/').pop();
                document.getElementById('analyticsLink').href = `/analytics.html?code=${code}`;

                loader.style.display = 'none';
                resultSection.style.display = 'block';

            } catch (error) {
                alert(error.message);
                form.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        function copyToClipboard() {
            const text = document.getElementById('shortUrlText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = 'Copied!';
                btn.style.background = 'var(--success)';
                setTimeout(() => {
                    btn.innerText = 'Copy';
                    btn.style.background = 'rgba(255, 255, 255, 0.1)';
                }, 2000);
            });
        }

        function resetForm() {
            form.reset();
            form.style.display = 'block';
            resultSection.style.display = 'none';
            loader.style.display = 'none';
        }
    </script>
</body>
</html>
